<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" role="img" aria-label="Stromy Data Rail motif">
  <!-- Vertical rail -->
  <line x1="20" y1="10" x2="20" y2="190" stroke="#ECE6DA" stroke-width="2" stroke-linecap="round"/>

  <!-- Primary checkpoint: oxide filled -->
  <circle cx="20" cy="30" r="6.5" fill="#B96034"/>
  <!-- Evidence stem -->
  <line x1="26.5" y1="30" x2="80" y2="30" stroke="#B96034" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Secondary checkpoint: mineral filled -->
  <circle cx="20" cy="70" r="5" fill="#47685B"/>
  <!-- Evidence stem -->
  <line x1="25" y1="70" x2="60" y2="70" stroke="#47685B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tertiary checkpoint: paper outlined -->
  <circle cx="20" cy="105" r="5.5" fill="none" stroke="#ECE6DA" stroke-width="2"/>
  <!-- Evidence stem -->
  <line x1="25.5" y1="105" x2="95" y2="105" stroke="#ECE6DA" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>

  <!-- Secondary checkpoint -->
  <circle cx="20" cy="140" r="5" fill="#47685B"/>
  <!-- Evidence stem -->
  <line x1="25" y1="140" x2="70" y2="140" stroke="#47685B" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Primary checkpoint -->
  <circle cx="20" cy="170" r="6.5" fill="#B96034"/>
  <!-- Evidence stem -->
  <line x1="26.5" y1="170" x2="110" y2="170" stroke="#B96034" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Terminus mark -->
  <line x1="14" y1="190" x2="26" y2="190" stroke="#ECE6DA" stroke-width="2" stroke-linecap="round"/>
</svg>
