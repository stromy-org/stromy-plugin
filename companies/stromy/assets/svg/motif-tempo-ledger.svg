<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 34" role="img" aria-label="Stromy Tempo Ledger motif">
  <!-- Upper rule: paper/forest -->
  <line x1="0" y1="7" x2="328" y2="7" stroke="#1D342B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Lower rule: oxide, offset -->
  <line x1="22" y1="23" x2="368" y2="23" stroke="#B96034" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Registration block at terminal edge -->
  <rect x="374" y="2" width="16" height="30" rx="3" fill="none" stroke="#B96034" stroke-width="2" stroke-linejoin="round"/>
  <!-- Internal tick mark -->
  <line x1="382" y1="10" x2="382" y2="24" stroke="#B96034" stroke-width="1.5" stroke-linecap="round"/>
</svg>
