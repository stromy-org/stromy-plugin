<!--
  PPTX section-divider slide — anchor template.
  Consumed by `pptx-hd` render-anchors mode.

  Injected: {{HERO_URL}} {{LOGO_WHITE_URL}} {{SECTION_NUMBER}} {{SECTION_TITLE}}
            {{TOKENS_CSS}} {{FONT_FACES}} {{CONFIDENTIALITY}}
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
{{TOKENS_CSS}}
{{FONT_FACES}}

html, body { margin: 0; padding: 0; }
body {
  width: 1280px; height: 720px;
  color: white;
  background:
    linear-gradient(rgba(20,30,28,0.6), rgba(20,30,28,0.6)),
    url("{{HERO_URL}}") center/cover;
  font-family: var(--font-body, system-ui, sans-serif);
  position: relative;
  overflow: hidden;
}
.section-number {
  position: absolute;
  top: 60px;
  left: 60px;
  font-family: var(--font-mono, monospace);
  font-size: 14pt;
  color: var(--color-accent);
  letter-spacing: 0.2em;
}
.section-title {
  position: absolute;
  top: 50%;
  left: 60px;
  right: 60px;
  transform: translateY(-50%);
  font-family: var(--font-display, var(--font-heading));
  font-size: 64pt;
  line-height: 1.1;
  color: white;
  max-width: 900px;
}
.logo  { position: absolute; bottom: 40px; left: 60px; }
.logo img { height: 28pt; width: auto; opacity: 0.8; }
.meta {
  position: absolute;
  bottom: 32px;
  right: 60px;
  font-family: var(--font-mono, monospace);
  font-size: 9pt;
  opacity: 0.7;
}
</style>
</head>
<body>
  <div class="section-number">{{SECTION_NUMBER}}</div>
  <div class="section-title">{{SECTION_TITLE}}</div>
  <div class="logo"><img src="{{LOGO_WHITE_URL}}" alt=""></div>
  <div class="meta">{{CONFIDENTIALITY}}</div>
</body>
</html>
