<!--
  PPTX footer-bar fragment — standalone HTML snippet for embedding into
  any LLM-authored content slide that wants the brand-consistent footer
  without inheriting the rest of the content.html frame.

  Injected: {{LOGO_MONO_URL}} {{CLIENT_NAME}} {{CONFIDENTIALITY}}
            {{PAGE}} {{PAGES}}
-->
<div class="footer-bar" style="
  position: absolute;
  bottom: 16px;
  left: 60px;
  right: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono, monospace);
  font-size: 8pt;
  color: var(--color-text-light, #666);
">
  <div style="display: flex; align-items: center; gap: 10pt;">
    <img src="{{LOGO_MONO_URL}}" alt="" style="height: 14pt; width: auto; opacity: 0.7;">
    <span>{{CLIENT_NAME}}</span>
  </div>
  <div style="display: flex; align-items: center; gap: 10pt;">
    <span>{{CONFIDENTIALITY}}</span>
    <span>{{PAGE}} / {{PAGES}}</span>
  </div>
</div>
